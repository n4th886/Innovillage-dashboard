<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Innovillage Dashboard</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>
  <h2>Reactor: RKT-001</h2>

  <p>Temperature: <span id="temp">-</span></p>
  <p>Pressure: <span id="press">-</span></p>
  <p>Methane: <span id="meth">-</span></p>
  <p>pH: <span id="ph">-</span></p>


<script>
  // ===== GANTI INI =====
  const HOST = "ca75ef857bdb4fd2a5fad02da7922d4e.s1.eu.hivemq.cloud";
  const USER = "USER1";
  const PASS = "girimekarRKT-001";
  const TOPIC = "innovillage/reactors/RKT-001/current";
  // ======================

  // HiveMQ WebSocket Secure port
  const url = `wss://${HOST}:8884/mqtt`;

  const client = mqtt.connect(url, {
    username: USER,
    password: PASS,
    clean: true,
    // penting: biar nggak bentrok dengan MQTTX / device lain
    clientId: "web_" + Math.random().toString(16).slice(2),
  });

  client.on("connect", () => {
    console.log("Connected!");

    client.subscribe(TOPIC, (err, granted) => {
      if (err) console.error("SUBSCRIBE ERROR:", err);
      else console.log("SUBSCRIBED:", granted);
    });
  });

  client.on("error", (err) => {
    console.error("MQTT ERROR:", err);
  });

  client.on("close", () => {
    console.log("MQTT CLOSED");
  });

  client.on("message", (topic, message) => {
    const raw = message.toString();
    console.log("MESSAGE IN:", topic);
    console.log("RAW:", raw);

    try {
      const data = JSON.parse(raw);

      document.getElementById("temp").textContent = data.temperature ?? "-";
      document.getElementById("press").textContent = data.pressure ?? "-";
      document.getElementById("meth").textContent = data.methane ?? "-";
      document.getElementById("ph").textContent = data.ph ?? "-";
    } catch (e) {
      console.error("JSON PARSE FAILED:", e);
    }
  });
</script>
</body>
</html>
